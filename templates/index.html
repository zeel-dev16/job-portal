<!DOCTYPE html>
<html>
    <head>
        <title>JOB PORTAL</title>

        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background: linear-gradient(to right, #4facfe, #00f2fe);
                text-align: center;
                color: white;
                margin: 0;
                padding: 0;
            }
            .container {
                margin-top: 100px;
            }
            h1 {
                font-size: 40px;
            }
            p {
                font-size: 18px;
            }
            .btn {
                margin-top: 20px;
                padding: 10px 20px;
                background: white;
                color: #333;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
            .btn:hover {
                background: #ddd;
            }
        </style>

    </head>
    <body>
        
        <div class="container">
            <h1> JOB PORTAL </h1>
            <p>Find your dream job easily</p>

            <a href="/register">
                <button class="btn">Register</button>
            </a>

            <a href="/login">
                <button class="btn">Login</button>
            </a>
            
        </div>
    </body>
</html>
