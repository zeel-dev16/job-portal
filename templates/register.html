<!DOCTYPE html>
<html>
    <head>
        <title>REGISTER</title>

        <style>
            body {
                font-family: Georgia, 'Times New Roman', Times, serif;
                background: #4facfe;
                text-align: center;
            }
            .box {
                background: white;
                padding: 20px;
                margin: 100px auto;
                width: 300px;
                border-radius: 10px;
            }
            .input {
                width: 90%;
                padding: 8px;
                margin: 10px;
            }
            button {
                padding: 10px;
                background: #4facfe;
                color: white;
                border: none;
                cursor: pointer;
            }
        </style>

    </head>
    <body>
        <div class="box">
            <h2>Register</h2>
            
            <p style="color:red;"> {{ message }} </p>

            <form method="POST">
                <input type="text" name="name" placeholder="ENTER NAME"><br>
                <input type="email" name="email" placeholder="ENTER EMAIL"><br>
                <input type="password" name="password" placeholder="ENTER PASSWORD"><br>

                <button type="submit">REGISTER</button>
            </form>
        </div>
    </body>
</html>
