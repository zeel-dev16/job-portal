<!DOCTYPE html>
<html>
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard</title>

</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Welcome, {{ user }} 👋</h2>
        <h3 class="mb-3">Available Jobs 💼</h3>

        <div class="row">
            {% for job in jobs %}
            <div class="col-md-4">
                <div class="card mb-4 shadow">
                    <div class="card-body">
                        <h5 class="card-title">{{ job[1] }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ job[2] }}</h6>
                        <p class="card-text">{{ job[3] }}</p>

                        <a href="/apply/{{ job[0] }}" class="btn btn-primary">Apply</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <a href="/add-job" class="btn btn-success">Add Job</a>
        <a href="/logout" class="btn btn-danger">Logout</a>

    </div>

</body>
</html>
